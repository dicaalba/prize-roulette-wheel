<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display - Ruleta AWS Girls Peru</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="display.css">
</head>
<body>
  <div class="display-container">
    <!-- Left Panel: QR + Community Info -->
    <section class="qr-panel">
      <h1 class="display-title">¡Gira la Ruleta!</h1>
      <p class="display-subtitle">Escanea el código QR para participar</p>

      <div id="qr-container" class="qr-container">
        <canvas id="qr-canvas"></canvas>
      </div>
      <p class="qr-url" id="qr-url-text"></p>

      <!-- Separador -->
      <div class="community-divider">
        <span>Síguenos en redes</span>
      </div>

      <!-- Info comunidad AWS Girls Peru -->
      <div class="social-grid">
        <a href="https://www.meetup.com/aws-girls-peru/" target="_blank" class="social-btn meetup">
          <span class="social-icon">📅</span><span>Meetup</span>
        </a>
        <a href="https://www.instagram.com/awsgirlsperu" target="_blank" class="social-btn instagram">
          <span class="social-icon">📸</span><span>Instagram</span>
        </a>
        <a href="https://www.linkedin.com/company/aws-girls-user-group-peru" target="_blank" class="social-btn linkedin">
          <span class="social-icon">💼</span><span>LinkedIn</span>
        </a>
        <a href="https://www.youtube.com/@awsgirls7886" target="_blank" class="social-btn youtube">
          <span class="social-icon">▶️</span><span>YouTube</span>
        </a>
      </div>
      <p class="website-link">🌐 awsgirlsperu.com</p>
    </section>

    <!-- Right Panel: Prize List -->
    <section class="prizes-panel">
      <h2 class="prizes-title">Premios Disponibles</h2>
      <div id="prize-list" class="prize-list">
        <div class="loading-state">Cargando premios...</div>
      </div>
    </section>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/wsClient.js"></script>
  <script src="display.js"></script>
</body>
</html>
