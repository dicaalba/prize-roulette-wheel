<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ruleta de Premios - AWS Girls Peru</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <h1>AWS Girls Peru - Ruleta de Premios</h1>
  </header>

  <section class="wheel-section">
    <div class="wheel-wrapper">
      <div class="wheel-pointer"></div>
      <div id="wheel-container">
        <canvas id="wheel-canvas" width="400" height="400"></canvas>
      </div>
    </div>
  </section>

  <section class="spin-section">
    <button id="spin-btn" disabled>Girar</button>
    <p id="status-text"></p>
  </section>

  <!-- Redes sociales AWS Girls Peru -->
  <section class="community-section">
    <div class="community-divider"><span>Síguenos en redes</span></div>
    <div class="social-grid">
      <a href="https://www.meetup.com/aws-girls-peru/" target="_blank" rel="noopener" class="social-btn meetup">
        <span class="social-icon">📅</span><span>Meetup</span>
      </a>
      <a href="https://www.instagram.com/awsgirlsperu" target="_blank" rel="noopener" class="social-btn instagram">
        <span class="social-icon">📸</span><span>Instagram</span>
      </a>
      <a href="https://www.linkedin.com/company/aws-girls-user-group-peru" target="_blank" rel="noopener" class="social-btn linkedin">
        <span class="social-icon">💼</span><span>LinkedIn</span>
      </a>
      <a href="https://www.youtube.com/@awsgirls7886" target="_blank" rel="noopener" class="social-btn youtube">
        <span class="social-icon">▶️</span><span>YouTube</span>
      </a>
    </div>
    <a href="https://awsgirlsperu.com" target="_blank" rel="noopener" class="website-link">🌐 awsgirlsperu.com</a>
  </section>

  <!-- Result Modal -->
  <div id="result-modal" class="modal-overlay">
    <div class="modal-content">
      <button id="modal-close-btn" class="modal-close">&times;</button>
      <h2 id="result-heading" class="result-heading"></h2>
      <p id="result-description"></p>
      <a id="meetup-btn" class="meetup-button" href="#" target="_blank" rel="noopener noreferrer">
        Síguenos en Meetup para reclamar tu premio
      </a>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/wheelRenderer.js"></script>
  <script src="js/spinEngine.js"></script>
  <script src="js/animationController.js"></script>
  <script src="js/resultModal.js"></script>
  <script src="js/wsClient.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
