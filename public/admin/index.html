<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Ruleta de Premios</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1>🔐 Admin Panel</h1>
      <p>Ingresa la contraseña para acceder</p>
      <form id="login-form">
        <input type="password" id="login-password" placeholder="Contraseña" required>
        <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
        <p id="login-error" class="error-text"></p>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div id="admin-dashboard" class="admin-dashboard" style="display:none;">
    <header class="admin-header">
      <h1>🎰 Panel de Administración</h1>
      <div class="header-actions">
        <span id="ws-status" class="ws-status">● Conectado</span>
        <button id="logout-btn" class="btn btn-outline">Cerrar Sesión</button>
      </div>
    </header>

    <main class="admin-main">
      <!-- Add Prize Form -->
      <section class="card">
        <h2 id="form-title">Agregar Premio</h2>
        <form id="prize-form">
          <input type="hidden" id="edit-prize-id" value="">
          <div class="form-row">
            <div class="form-group">
              <label for="prize-name">Nombre (máx. 30 caracteres)</label>
              <input type="text" id="prize-name" maxlength="30" required placeholder="Nombre del premio">
            </div>
            <div class="form-group">
              <label for="prize-color">Color</label>
              <input type="color" id="prize-color" value="#E74C3C" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="prize-description">Descripción</label>
              <input type="text" id="prize-description" placeholder="Descripción del premio">
            </div>
            <div class="form-group">
              <label for="prize-stock">Stock</label>
              <input type="number" id="prize-stock" min="0" value="10" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group checkbox-group">
              <label>
                <input type="checkbox" id="prize-is-no-prize">
                Es segmento "Sin Premio"
              </label>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="form-submit-btn">Agregar Premio</button>
            <button type="button" class="btn btn-outline" id="form-cancel-btn" style="display:none;">Cancelar</button>
          </div>
          <p id="form-error" class="error-text"></p>
        </form>
      </section>

      <!-- Prize Table -->
      <section class="card">
        <h2>Premios Actuales <span id="prize-count" class="badge">0</span></h2>
        <div class="table-wrapper">
          <table id="prizes-table">
            <thead>
              <tr>
                <th>Color</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Stock</th>
                <th>Tipo</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="prizes-tbody">
              <tr><td colspan="6" class="empty-state">Cargando premios...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/wsClient.js"></script>
  <script src="/admin/admin.js"></script>
</body>
</html>
